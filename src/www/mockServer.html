<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tello MockServer</title>
    <link rel="stylesheet" href="./assets/vendor.css"/>
    <style>
        :root {
            --bg: #0b0d11;
            --surface: #15171c;
            --surface-border: #1e2128;
            --text: #e2e4e9;
            --text-dim: #71747e;
            --green: #34d399;
            --red: #f87171;
            --blue: #60a5fa;
            --amber: #fbbf24;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .mock {
            width: 100%;
            max-width: 800px;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.01em;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--amber);
            flex-shrink: 0;
        }
        .status-dot.connected { background: var(--green); box-shadow: 0 0 8px var(--green); }
        .status-dot.error { background: var(--red); box-shadow: 0 0 8px var(--red); }
        .status-label { font-size: 13px; color: var(--text-dim); }
        .log {
            background: var(--surface);
            border: 1px solid var(--surface-border);
            border-radius: 12px;
            padding: 16px;
        }
        .log-header {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-dim);
            margin-bottom: 12px;
        }
        .log-content {
            font: 13px/1.7 SF Mono, Monaco, Consolas, monospace;
            overflow-y: auto;
            height: 400px;
            word-break: break-all;
        }
        .log-content .time { color: var(--text-dim); }
        .log-content .cmd { color: var(--blue); }
        .log-content .resp { color: var(--green); }
        .log-content .sep { color: var(--text-dim); margin: 0 4px; }
        .log-content .line { padding: 2px 0; }
        .footer {
            margin-top: 24px;
            text-align: center;
            font-size: 12px;
            color: var(--text-dim);
            line-height: 1.8;
        }
        .footer a {
            color: var(--text-dim);
            text-decoration: none;
        }
        .footer a:hover { color: var(--text); }
        .footer .sep { margin: 0 6px; }
        @media (max-width: 600px) {
            .log-content { height: 300px; font-size: 12px; }
            body { padding: 8px; }
        }
    </style>
</head>
<body>
<div class="mock">
    <div class="header">
        <div class="status-dot" id="statusDot"></div>
        <span class="status-label" id="statusLabel">Connecting</span>
        <h1>MockServer</h1>
    </div>
    <div class="log">
        <div class="log-header">Command Log</div>
        <div class="log-content" id="content"></div>
    </div>
    <div class="footer">
        <a href="https://github.com/Giwi/ryze-tello-sdk">GitHub</a><span class="sep">·</span>
        <a href="https://www.npmjs.com/package/@giwisoft/ryze-tello-sdk">npm</a><span class="sep">·</span>
        <a href="https://giwi.fr">GiwiSoft</a><br>
        Ryze Tello SDK &copy; 2026 GiwiSoft
    </div>
</div>
<script src="./assets/vendor.js"></script>
<script>
    $(function () {
        var content = $('#content'), dot = $('#statusDot'), label = $('#statusLabel');
        window.WebSocket = window.WebSocket || window.MozWebSocket;
        if (!window.WebSocket) {
            content.html('<span style="color:var(--text-dim)">WebSocket not supported</span>');
            label.text('Unsupported');
            return;
        }
        var connection = new WebSocket('ws://127.0.0.1:1337');

        connection.onopen = function () {
            dot.addClass('connected');
            dot.removeClass('error');
            label.text('Connected');
        };

        connection.onerror = function () {
            dot.addClass('error');
            dot.removeClass('connected');
            label.text('Connection error');
            content.html('<span style="color:var(--red)">Connection failed</span>');
        };

        connection.onmessage = function (msg) {
            var d = JSON.parse(msg.data);
            var line = $('<div class="line"></div>');
            if (d.type === 'request') {
                line.html('<span class="time">' + new Date().toISOString() + '</span><span class="sep">→</span><span class="cmd">' + $('<span>').text(d.message).html() + '</span>');
            } else {
                line.html('<span class="resp">' + $('<span>').text(d.message).html() + '</span>');
            }
            content.append(line);
            content.scrollTop(content[0].scrollHeight);
        };

        setInterval(function () {
            if (connection.readyState !== 1) {
                dot.addClass('error');
                dot.removeClass('connected');
                label.text('Disconnected');
            }
        }, 3000);
    });
</script>
</body>
</html>
